version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: creative-impression-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creative_impression
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - creative-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creative-impression-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - creative-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  adminer:
    image: adminer
    container_name: creative-impression-adminer
    ports:
      - "8080:8080"
    networks:
      - creative-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  creative-network:
    driver: bridge
